# ──────────────────────────────────────────────────────────
# SID.AI — Render Blueprint
# Deploy this file from the Render dashboard:
#   New → Blueprint → Connect your GitHub repo
# ──────────────────────────────────────────────────────────

services:
  - type: web
    name: sidai-backend
    runtime: python
    plan: free
    region: oregon
    buildCommand: cd backend && pip install --no-cache-dir -r prod-requirements.txt
    startCommand: cd backend && python -c "from app import app; print('Import OK')" && uvicorn app:app --host 0.0.0.0 --port $PORT 2>&1
    healthCheckPath: /health
    envVars:
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://sid-ai-gamma.vercel.app,https://sidai-backend.onrender.com
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////tmp/sidai.db
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: OPENAI_MODEL
        value: llama-3.1-8b-instant
      - key: GOOGLE_CLIENT_ID
        value: 122309050269-9hroq2jnfueg1v889gvgnaurnsfueimk.apps.googleusercontent.com
