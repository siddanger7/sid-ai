app = "sid-ai"

[build]
  dockerfile = "Dockerfile"

[[services]]
  protocol = "tcp"
  internal_port = 8888

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls"]

  [[services.concurrency]]
    type = "requests"
    hard_limit = 25
    soft_limit = 10

  [[services.env]]
    key = "JWT_SECRET_KEY"
    value = "change-me-in-production"

  [[services.env]]
    key = "CORS_ORIGINS"
    value = "https://sid-ai.fly.dev"

  [[services.env]]
    key = "LOG_LEVEL"
    value = "INFO"
